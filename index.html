<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanışma Listemiz 💕</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<header class="app-header">
  <h1>En Sevdiklerimiz 💕</h1>
  <p class="subtitle">Birlikte keşfedip sıralayalım</p>
</header>

<!-- Giriş ekranı -->
<main id="screen-login" class="container login-screen">
  <div class="login-card">
    <h2 class="section-title">Kim giriş yapıyor?</h2>
    <div class="login-buttons">
      <button type="button" id="login-ibo" class="login-btn login-btn-ibo">İbo olarak gir</button>
      <button type="button" id="login-zehra" class="login-btn login-btn-zehra">Zehra olarak gir</button>
      <button type="button" id="login-observer" class="login-btn login-btn-observer">👀 Gözlemci olarak gir</button>
    </div>
  </div>
</main>

<!-- Kullanıcı paneli -->
<main id="screen-dashboard" class="container" hidden>
  <div class="dashboard-topbar">
    <span id="current-user-label" class="current-user-label"></span>
    <button type="button" id="switch-user-btn" class="link-btn">Kullanıcı değiştir</button>
  </div>

  <div id="rank-target-banner" class="rank-target-banner" hidden>
    <span id="rank-target-text"></span>
    <button type="button" id="rank-target-cancel" class="link-btn">İptal</button>
  </div>

  <section class="search-section">
    <form id="search-form" class="search-form">
      <input type="text" id="search-input" placeholder="Ara: gumball, pizza, lamborghini, mavi..." autocomplete="off" required>
      <button type="submit">Ara</button>
    </form>

    <div class="add-target">
      <label for="category-select">Eklenecek kategori:</label>
      <select id="category-select"></select>
      <button type="button" id="toggle-new-category-btn" class="link-btn">+ Yeni Kategori</button>
    </div>

    <form id="new-category-form" class="new-category-form" hidden>
      <input type="text" id="new-category-input" placeholder="Yeni kategori adı" autocomplete="off" required>
      <button type="submit">Ekle</button>
    </form>

    <div id="search-status" class="status-text"></div>
    <div id="search-results" class="card-grid"></div>
  </section>

  <section id="categories-container" class="categories-container"></section>

  <section class="finish-section">
    <button type="button" id="finish-btn" class="finish-btn">Tanıtma İşlemini Bitir 🎉</button>
    <p id="finish-status" class="status-text"></p>
  </section>
</main>

<!-- Gözlemci: kullanıcı seçimi -->
<main id="screen-observer-select" class="container" hidden>
  <button type="button" id="observer-back-btn" class="link-btn">← Geri</button>
  <h2 class="section-title">Kimin favorilerini izlemek istersin?</h2>
  <div class="observer-cards">
    <button type="button" id="observer-pick-ibo" class="observer-card observer-card-ibo" disabled>
      <span class="observer-card-title">İbo'nun Favorileri</span>
      <span class="observer-card-status">Yükleniyor...</span>
    </button>
    <button type="button" id="observer-pick-zehra" class="observer-card observer-card-zehra" disabled>
      <span class="observer-card-title">Zehra'nın Favorileri</span>
      <span class="observer-card-status">Yükleniyor...</span>
    </button>
  </div>
</main>

<!-- Gözlemci: slayt gösterisi -->
<main id="screen-slideshow" class="slideshow-screen" hidden>
  <button type="button" id="slideshow-back-btn" class="link-btn slideshow-back-btn">← Geri</button>
  <h2 id="slideshow-owner-title" class="slideshow-owner-title"></h2>
  <h3 id="slideshow-category-title" class="slideshow-category-title"></h3>

  <div class="slideshow-stage">
    <button type="button" id="slideshow-prev" class="slideshow-arrow slideshow-arrow-left" aria-label="Önceki">←</button>
    <div class="slideshow-slide">
      <span id="slideshow-rank" class="slideshow-rank"></span>
      <img id="slideshow-image" class="slideshow-image" src="" alt="">
      <span id="slideshow-name" class="slideshow-name"></span>
      <p id="slideshow-description" class="slideshow-description"></p>
    </div>
    <button type="button" id="slideshow-next" class="slideshow-arrow slideshow-arrow-right" aria-label="Sonraki">→</button>
  </div>

  <div id="slideshow-end" class="slideshow-end" hidden>
    <p>Tüm favoriler gösterildi 🎉</p>
    <button type="button" id="slideshow-end-back-btn" class="finish-btn">Seçim ekranına dön</button>
  </div>
</main>

<template id="category-template">
  <div class="category-card" draggable="false">
    <div class="category-header">
      <h2 class="category-title"></h2>
      <button class="delete-category-btn" title="Kategoriyi sil">Kategoriyi Sil</button>
    </div>
    <ul class="item-list"></ul>
  </div>
</template>

<template id="rank-group-template">
  <li class="rank-group" draggable="true">
    <div class="rank-group-header">
      <span class="rank-badge"></span>
      <button type="button" class="add-variation-btn">+ Bu sıraya ekle</button>
    </div>
    <div class="variation-gallery"></div>
  </li>
</template>

<template id="variation-template">
  <div class="variation-card">
    <img class="item-image" src="" alt="">
    <span class="item-name"></span>
    <div class="variation-actions">
      <button class="edit-note-btn" title="Not ekle/düzenle">✏️</button>
      <button class="remove-item-btn" title="Sil">×</button>
    </div>
    <p class="item-note-preview" hidden></p>
    <div class="item-note-editor" draggable="false" hidden>
      <textarea class="item-note-textarea" rows="3" placeholder="Bu öğeyle ilgili notunu yaz..."></textarea>
      <button type="button" class="save-note-btn">Kaydet</button>
    </div>
  </div>
</template>

<template id="search-card-template">
  <div class="search-card" tabindex="0" role="button">
    <img class="search-card-image" src="" alt="">
    <span class="search-card-tag"></span>
  </div>
</template>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="config.js?v=2"></script>
<script src="script.js?v=2"></script>
</body>
</html>
